services:
  - type: web
    name: taxsmart-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false       # Set this manually in Render dashboard → Environment
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
